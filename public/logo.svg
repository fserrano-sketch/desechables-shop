<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" fill="none">
  <!-- White background rectangle with navy border -->
  <rect x="8" y="8" width="150" height="150" rx="8" ry="8" fill="white" stroke="#1a3068" stroke-width="6"/>

  <!-- P shape (navy) -->
  <path d="M38 40 L38 130" stroke="#1a3068" stroke-width="12" stroke-linecap="round"/>
  <path d="M38 40 Q95 40 95 72 Q95 104 38 104" stroke="#1a3068" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Plus / cross (teal) -->
  <line x1="106" y1="118" x2="150" y2="118" stroke="#2bbfb0" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="96" x2="128" y2="140" stroke="#2bbfb0" stroke-width="10" stroke-linecap="round"/>

  <!-- DESECHABLES -->
  <text x="83" y="184" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900"
    fill="#1a3068" text-anchor="middle" letter-spacing="1.5">DESECHABLES</text>

  <!-- Decorative lines + Y PLÁSTICOS -->
  <line x1="8" y1="198" x2="36" y2="198" stroke="#2bbfb0" stroke-width="1.5"/>
  <text x="83" y="201" font-family="Arial, sans-serif" font-size="11" font-weight="600"
    fill="#2bbfb0" text-anchor="middle" letter-spacing="3">Y PLÁSTICOS</text>
  <line x1="130" y1="198" x2="158" y2="198" stroke="#2bbfb0" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text x="83" y="220" font-family="Arial, sans-serif" font-size="7"
    fill="#1a3068" text-anchor="middle" letter-spacing="2">MATERIAL MÉDICO DE CURACIÓN</text>
</svg>
